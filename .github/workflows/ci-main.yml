name: CI/CD - Main Branch

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '18'
  CACHE_VERSION: 'v1'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
      docker: ${{ steps.changes.outputs.docker }}
      helm: ${{ steps.changes.outputs.helm }}
      tests: ${{ steps.changes.outputs.tests }}
      version: ${{ steps.version.outputs.version }}
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            frontend:
              - 'src/**/*.jsx'
              - 'src/**/*.js'
              - 'src/**/*.css'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.js'
              - 'tailwind.config.js'
              - 'postcss.config.js'
            backend:
              - 'src/backend/**'
              - 'package.json'
              - 'package-lock.json'
            docker:
              - 'Dockerfile*'
              - 'docker-compose*'
              - '.dockerignore'
            helm:
              - 'charts/**'
            tests:
              - 'src/**/*.test.js'
              - 'src/**/*.test.jsx'
              - 'tests/**'
              - 'jest.config.js'
              - 'vitest.config.js'
              - 'scripts/test-parallel.js'

      - name: Determine version and tag status
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            IS_TAG=true
          else
            VERSION=$GITHUB_SHA
            IS_TAG=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_tag=$IS_TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Is Tag: $IS_TAG"

  cache-dependencies:
    name: Cache Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: [changes, cache-dependencies]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Check for cached lint results
        id: cache-lint
        uses: actions/cache@v3
        with:
          path: .lint-cache
          key: lint-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('src/**', '.eslintrc*', 'package.json') }}

      - name: Lint code
        if: steps.cache-lint.outputs.cache-hit != 'true'
        run: |
          mkdir -p .lint-cache
          npm run lint 2>&1 | tee .lint-cache/lint-results.log

  test:
    name: Test with Heavy Parallelism
    runs-on: ubuntu-latest
    needs: [changes, cache-dependencies]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.tests == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Check for cached test results
        id: cache-test
        uses: actions/cache@v3
        with:
          path: |
            coverage/
            .test-cache/
          key: test-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('src/**', 'tests/**', 'package.json', 'jest.config.js', 'vitest.config.js') }}

      - name: Run parallel tests with heavy parallelism
        if: steps.cache-test.outputs.cache-hit != 'true'
        run: |
          mkdir -p .test-cache
          npm run test:parallel 2>&1 | tee .test-cache/test-results.log
        env:
          CI: true

      - name: Upload coverage to Codecov
        if: steps.cache-test.outputs.cache-hit != 'true'
        uses: codecov/codecov-action@v3
        with:
          directory: coverage
          flags: combined
          name: main-branch-coverage

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [changes, cache-dependencies]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    outputs:
      build-cache-hit: ${{ steps.cache-build.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install librsvg for icon generation
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v3
        with:
          path: |
            dist/
            dist-static/
          key: build-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('src/**', 'package.json', 'vite.config.js') }}

      - name: Build application
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          npm run build:frontend
          npm run build:frontend:static
          npm run build:backend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts-${{ github.sha }}
          path: |
            dist/
            dist-static/
          retention-days: 7

  docker-build-and-publish:
    name: Build and Publish Docker Images
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.build.outputs.build-cache-hit != 'true'
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        if: needs.build.outputs.build-cache-hit != 'true'
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=${{ needs.changes.outputs.is_tag == 'true' && 'tag-' || 'commit-' }}
            type=raw,value=${{ needs.changes.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  helm-package-and-publish:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [changes, docker-build-and-publish]
    if: needs.changes.outputs.helm == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Configure Git for Helm
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Update Helm chart version and image tags
        run: |
          VERSION="${{ needs.changes.outputs.version }}"
          if [[ "${{ needs.changes.outputs.is_tag }}" == "true" ]]; then
            # For tags, use the tag as version and image tag
            CHART_VERSION=${VERSION#v}  # Remove 'v' prefix if present
            IMAGE_TAG="tag-$VERSION"
          else
            # For commits, use semantic versioning with commit hash
            CHART_VERSION="0.0.0-${VERSION:0:7}"
            IMAGE_TAG="commit-$VERSION"
          fi

          # Update Chart.yaml
          sed -i "s/^version:.*/version: $CHART_VERSION/" charts/kubamf/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/kubamf/Chart.yaml

          # Update values.yaml with new image tags
          sed -i "s/tag:.*/tag: \"$IMAGE_TAG\"/" charts/kubamf/values.yaml

      - name: Lint Helm chart
        run: helm lint charts/kubamf

      - name: Package Helm chart
        run: |
          helm package charts/kubamf --destination ./helm-packages

      - name: Publish Helm chart to GitHub Packages
        run: |
          CHART_PACKAGE=$(ls helm-packages/*.tgz)
          helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          helm push $CHART_PACKAGE oci://${{ env.REGISTRY }}/${{ github.repository }}/charts

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts-${{ github.sha }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          CI: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [changes, cache-dependencies]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [changes, docker-build-and-publish, helm-package-and-publish]
    if: needs.changes.outputs.is_tag == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.changes.outputs.version }}
          release_name: Release ${{ needs.changes.outputs.version }}
          body: |
            ## What's Changed

            ### Docker Images
            - Backend: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:tag-${{ needs.changes.outputs.version }}`
            - Frontend: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:tag-${{ needs.changes.outputs.version }}`

            ### Helm Chart
            - Chart: `oci://${{ env.REGISTRY }}/${{ github.repository }}/charts/kubamf`

            ### Installation
            ```bash
            # Pull images
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:tag-${{ needs.changes.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:tag-${{ needs.changes.outputs.version }}

            # Install with Helm
            helm install kubamf oci://${{ env.REGISTRY }}/${{ github.repository }}/charts/kubamf --version ${{ needs.changes.outputs.version }}
            ```
          draft: false
          prerelease: false

  deployment-notification:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [changes, docker-build-and-publish, helm-package-and-publish, integration-tests]
    if: always() && (needs.docker-build-and-publish.result == 'success' || needs.helm-package-and-publish.result == 'success')
    steps:
      - name: Notify deployment success
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "Version: ${{ needs.changes.outputs.version }}"
          echo "Images published: ${{ needs.docker-build-and-publish.result == 'success' }}"
          echo "Helm chart published: ${{ needs.helm-package-and-publish.result == 'success' }}"
          echo "Integration tests: ${{ needs.integration-tests.result }}"