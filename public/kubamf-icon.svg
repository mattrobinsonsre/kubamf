<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F79E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#326CE5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>

  <!-- Large Q - centered and bigger -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Q outer circle - bigger radius, thicker stroke -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <!-- Q tail - positioned further out -->
    <path d="M 100 100 L 150 150" stroke="white" stroke-width="24" stroke-linecap="round"/>

    <!-- Kubernetes wheel - inside the Q center, much larger -->
    <g transform="translate(0, 0)">
      <!-- Center hub -->
      <circle cx="0" cy="0" r="24" fill="white"/>

      <!-- Six spokes radiating from center -->
      <g stroke="white" stroke-width="12" stroke-linecap="round">
        <line x1="0" y1="-90" x2="0" y2="-35"/>
        <line x1="77.94" y1="-45" x2="30.31" y2="-17.5"/>
        <line x1="77.94" y1="45" x2="30.31" y2="17.5"/>
        <line x1="0" y1="90" x2="0" y2="35"/>
        <line x1="-77.94" y1="45" x2="-30.31" y2="17.5"/>
        <line x1="-77.94" y1="-45" x2="-30.31" y2="-17.5"/>
      </g>

      <!-- Outer ring -->
      <circle cx="0" cy="0" r="90" fill="none" stroke="white" stroke-width="12"/>

      <!-- Small decorative dots at spoke ends -->
      <g fill="white">
        <circle cx="0" cy="-90" r="10"/>
        <circle cx="77.94" cy="-45" r="10"/>
        <circle cx="77.94" cy="45" r="10"/>
        <circle cx="0" cy="90" r="10"/>
        <circle cx="-77.94" cy="45" r="10"/>
        <circle cx="-77.94" cy="-45" r="10"/>
      </g>
    </g>
  </g>
</svg>