<svg width="32" height="32" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#326CE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A4CBC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="128" cy="128" r="120" fill="url(#blueGradient)"/>

  <!-- Large Q Letter -->
  <g transform="translate(90,128)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="white" stroke-width="14"/>
    <path d="M 30 30 L 45 45" stroke="white" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Kubernetes wheel -->
  <g transform="translate(180,80)">
    <circle cx="0" cy="0" r="6" fill="white"/>
    <g stroke="white" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-18" x2="0" y2="-9"/>
      <line x1="15.6" y1="-9" x2="7.8" y2="-4.5"/>
      <line x1="15.6" y1="9" x2="7.8" y2="4.5"/>
      <line x1="0" y1="18" x2="0" y2="9"/>
      <line x1="-15.6" y1="9" x2="-7.8" y2="4.5"/>
      <line x1="-15.6" y1="-9" x2="-7.8" y2="-4.5"/>
    </g>
  </g>
</svg>