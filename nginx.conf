server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Security headers (configurable via environment variables)
    set $csp_enabled "${CSP_ENABLED}";
    set $hsts_enabled "${HSTS_ENABLED}";
    set $frame_options "${FRAME_OPTIONS}";

    # Basic security headers (always enabled)
    add_header X-Frame-Options "${frame_options:-SAMEORIGIN}" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Content Security Policy (if enabled)
    set $csp_header "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: https:; connect-src 'self' ${API_HOST}; font-src 'self'; object-src 'none'; media-src 'self'; frame-src 'none';";
    add_header Content-Security-Policy $csp_header always;

    # HSTS (if enabled and using HTTPS)
    set $hsts_header "max-age=31536000; includeSubDomains; preload";
    add_header Strict-Transport-Security $hsts_header always;

    # Gzip compression
    gzip on;
    gzip_types
        text/plain
        text/css
        text/js
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Rate limiting (configurable)
    limit_req_zone $binary_remote_addr zone=api:10m rate=${RATE_LIMIT_PER_SECOND:-10r/s};
    limit_req_zone $binary_remote_addr zone=static:10m rate=${STATIC_RATE_LIMIT_PER_SECOND:-50r/s};

    # Apply rate limiting to API calls
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass ${API_HOST};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # API-specific security headers
        add_header X-API-Version "1.0" always;

        # Timeout settings
        proxy_connect_timeout ${PROXY_CONNECT_TIMEOUT:-30s};
        proxy_send_timeout ${PROXY_SEND_TIMEOUT:-30s};
        proxy_read_timeout ${PROXY_READ_TIMEOUT:-30s};
    }

    # Static files with rate limiting
    location / {
        limit_req zone=static burst=100 nodelay;
        try_files $uri $uri/ /index.html;

        # Security for static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # Frontend health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"frontend","timestamp":"$time_iso8601","server":"$server_name"}';
        add_header Content-Type application/json;
        add_header X-Health-Check "frontend" always;
    }

    # Frontend readiness check
    location /health/ready {
        access_log off;
        try_files /index.html =503;
        return 200 '{"ready":true,"service":"frontend","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to common attack vectors
    location ~ /(wp-admin|wp-login|admin|phpmyadmin|xmlrpc) {
        deny all;
        access_log off;
        log_not_found off;
        return 444;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}