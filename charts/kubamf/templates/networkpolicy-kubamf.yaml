{{- if and .Values.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubamf.fullname" . }}
  labels:
    {{- include "kubamf.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubamf.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from pods in the same namespace (bamf agent)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3001
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.bamf.enabled }}
    # Allow egress to BAMF API — kubamf routes K8s calls through
    # the BAMF kube proxy (API → bridge → agent → K8s API).
    - ports:
        - protocol: TCP
          port: 8000
    {{- else }}
    # Allow egress to K8s API server. ClusterIP listens on 443 but
    # DNAT rewrites to the real endpoint port (6443). Allow both so
    # the policy works regardless of where the CNI evaluates it.
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- end }}
{{- end }}
