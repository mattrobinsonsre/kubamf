{{- if and .Values.enabled .Values.rbac.create }}
---
# ClusterRole granting kubamf read access to browse K8s resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubamf.fullname" . }}
  labels:
    {{- include "kubamf.labels" . | nindent 4 }}
rules:
  # Core resources — read
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - configmaps
      - secrets
      - namespaces
      - nodes
      - persistentvolumes
      - persistentvolumeclaims
      - serviceaccounts
      - events
    verbs: ["get", "list", "watch"]
  # Core resources — write
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
      - serviceaccounts
    verbs: ["create", "update", "patch", "delete"]
  # Pod exec
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs: ["create"]
  # Apps resources
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Batch resources
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Networking resources
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Storage resources
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  # RBAC resources — read only
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - clusterroles
      - rolebindings
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  # CRD resources — read
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubamf.fullname" . }}
  labels:
    {{- include "kubamf.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubamf.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubamf.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if or .Values.bamf.enabled .Values.rbac.impersonation.enabled }}
---
# ClusterRole granting impersonation — required for bamf mode
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubamf.fullname" . }}-impersonation
  labels:
    {{- include "kubamf.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - users
      - groups
      - serviceaccounts
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubamf.fullname" . }}-impersonation
  labels:
    {{- include "kubamf.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubamf.fullname" . }}-impersonation
subjects:
  - kind: ServiceAccount
    name: {{ include "kubamf.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
