{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubamf.fullname" . }}
  labels:
    {{- include "kubamf.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kubamf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-kubamf.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kubamf.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if and .Values.global .Values.global.image .Values.global.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.image.pullSecrets | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubamf.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 60 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kubamf
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "kubamf.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            {{- if .Values.bamf.enabled }}
            - name: BAMF_ENABLED
              value: "true"
            - name: AUTH_PROVIDER
              value: bamf
            - name: BAMF_API_URL
              value: {{ .Values.bamf.apiUrl | default (printf "http://%s-api:8000" .Release.Name) | quote }}
            {{- if .Values.bamf.kubeResourceName }}
            - name: BAMF_KUBE_RESOURCE_NAME
              value: {{ .Values.bamf.kubeResourceName | quote }}
            {{- end }}
            {{- else }}
            - name: AUTH_PROVIDER
              value: {{ .Values.auth.provider | default "none" }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: {{ hasKey .Values.livenessProbe "initialDelaySeconds" | ternary .Values.livenessProbe.initialDelaySeconds 10 }}
            periodSeconds: {{ hasKey .Values.livenessProbe "periodSeconds" | ternary .Values.livenessProbe.periodSeconds 20 }}
            {{- if hasKey .Values.livenessProbe "timeoutSeconds" }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: {{ hasKey .Values.readinessProbe "initialDelaySeconds" | ternary .Values.readinessProbe.initialDelaySeconds 5 }}
            periodSeconds: {{ hasKey .Values.readinessProbe "periodSeconds" | ternary .Values.readinessProbe.periodSeconds 10 }}
            {{- if hasKey .Values.readinessProbe "timeoutSeconds" }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if gt (int (default 0 .Values.preStopSleepSeconds)) 0 }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.preStopSleepSeconds }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "kubamf.fullname" . }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
