enabled: true

replicaCount: 1

image:
  repository: ghcr.io/mattrobinsonsre/kubamf
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ~

networkPolicy:
  enabled: true
  # Additional ingress rules beyond the default (allow from same namespace)
  additionalIngress: []

bamf:
  enabled: false
  # When true: auth=bamf, K8s calls routed through BAMF kube proxy
  # Internal BAMF API URL (defaults to http://{release-name}-api:8000)
  apiUrl: ""
  # Name of the kubernetes resource in BAMF agent config.
  # Required in BAMF mode — must match a 'kubernetes' type resource.
  kubeResourceName: ""

auth:
  provider: none  # 'none' or 'bamf'

rbac:
  create: true
  # impersonation ClusterRole for standalone mode with external auth
  impersonation:
    enabled: false

env: []
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: [ALL]
