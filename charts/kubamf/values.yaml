enabled: true

replicaCount: 1

image:
  repository: ghcr.io/kubamf/kubamf
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ~

networkPolicy:
  enabled: true
  # Additional ingress rules beyond the default (allow from same namespace)
  additionalIngress: []

bamf:
  enabled: false
  # When true: auth=bamf, impersonation RBAC, request-context middleware

auth:
  provider: none  # 'none' or 'bamf'

rbac:
  create: true
  # impersonation ClusterRole for bamf mode
  impersonation:
    enabled: false  # auto-enabled when bamf.enabled=true

env: []
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: [ALL]
